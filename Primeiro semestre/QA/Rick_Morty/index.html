<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty API - Buscar Personagens</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #00ff41 0%, #00cc00 25%, #008000 50%, #004d00 75%, #001a00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 65, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 204, 0, 0.2) 0%, transparent 50%);
            pointer-events: none;
            animation: portalPulse 4s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes portalPulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 3px;
        }

        .header p {
            color: #666;
            font-size: 11px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        .info-counter {
            background: #f5f5f5;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }

        .character-card {
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .character-card.show {
            display: block;
        }

        .character-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .character-info {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 11px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 11px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
        }

        .info-value {
            color: #333;
        }

        .error-box {
            display: none;
            padding: 15px;
            background: #ffebee;
            color: #b71c1c;
            border: 2px solid #ef5350;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-in-out;
        }

        .error-box.show {
            display: block;
        }

        .error-box strong {
            display: block;
            margin-bottom: 5px;
        }

        .success-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #1b5e20;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 8px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            padding: 8px 15px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .search-input-group input {
            flex: 1;
            padding: 8px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 12px;
            transition: border-color 0.3s;
        }

        .search-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-input-group button {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .search-input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Rick and Morty</h1>
            <p>Busque informações sobre personagens da série</p>
        </div>

        <div class="info-counter">
            <span id="counter-text">Carregando informações...</span>
        </div>

        <div class="search-tabs">
            <button class="tab-btn active" onclick="switchTab('id')">Buscar por ID</button>
            <button class="tab-btn" onclick="switchTab('name')">Buscar por Nome</button>
        </div>

        <!-- Busca por ID -->
        <div id="tab-id" class="tab-content active">
            <div class="search-input-group">
                <input 
                    type="number" 
                    id="characterIdInput" 
                    placeholder="Digite o ID (1-826)" 
                    min="1"
                    max="826"
                >
                <button onclick="searchCharacterById()">Buscar</button>
            </div>
        </div>

        <!-- Busca por Nome -->
        <div id="tab-name" class="tab-content">
            <div class="search-input-group">
                <input 
                    type="text" 
                    id="characterNameInput" 
                    placeholder="Digite o nome (ex: Morty)"
                >
                <button onclick="searchCharacterByName()">Buscar</button>
            </div>
        </div>

        <div class="loading" id="loadingSpinner">
            <div class="spinner"></div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="character-card" id="characterCard">
            <img id="characterImage" class="character-image" alt="Imagem do personagem">
            <div class="character-info">
                <div class="info-item">
                    <span class="info-label">Nome:</span>
                    <span class="info-value" id="characterName"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">ID:</span>
                    <span class="info-value" id="characterId"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <span class="info-value" id="characterStatus"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Espécie:</span>
                    <span class="info-value" id="characterSpecies"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tipo:</span>
                    <span class="info-value" id="characterType"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Gênero:</span>
                    <span class="info-value" id="characterGender"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Origem:</span>
                    <span class="info-value" id="characterOrigin"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Localização:</span>
                    <span class="info-value" id="characterLocation"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Episódios:</span>
                    <span class="info-value" id="characterEpisodes"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Criado em:</span>
                    <span class="info-value" id="characterCreated"></span>
                </div>
            </div>
            <div class="success-badge">✔ Dados carregados com sucesso</div>
        </div>
    </div>

    <script>
        // Trocar abas de busca
        function switchTab(tab) {
            // Esconder todos os tabs
            document.getElementById('tab-id').classList.remove('active');
            document.getElementById('tab-name').classList.remove('active');
            
            // Remover classe active de todos os botões
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Mostrar tab selecionado
            document.getElementById('tab-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        // Carregar informações sobre o total de personagens
        async function loadTotalCharacters() {
            try {
                const response = await fetch('https://rickandmortyapi.com/api/character');
                const data = await response.json();
                const total = data.info.count;
                document.getElementById('counter-text').textContent = 
                    `Total de personagens disponíveis: ${total}`;
                document.getElementById('characterIdInput').max = total;
            } catch (error) {
                console.error('Erro ao carregar total de personagens:', error);
                document.getElementById('counter-text').textContent = 
                    'Erro ao carregar informações. Tente novamente.';
            }
        }

        // Buscar personagem por ID - CT1
        async function searchCharacterById() {
            const input = document.getElementById('characterIdInput');
            const characterId = input.value.trim();
            const errorBox = document.getElementById('errorBox');
            const characterCard = document.getElementById('characterCard');
            const loading = document.getElementById('loadingSpinner');

            // Validar entrada - CT5
            if (!characterId) {
                showError('Por favor, digite um ID válido.');
                return;
            }

            // Validar tipo - CT4
            const id = parseInt(characterId);
            if (isNaN(id) || id < 1) {
                showError('O ID deve ser um número maior que 0.');
                return;
            }

            // Mostrar loading
            loading.classList.add('show');
            errorBox.classList.remove('show');
            characterCard.classList.remove('show');

            try {
                const response = await fetch(`https://rickandmortyapi.com/api/character/${id}`);
                
                // Validar erro 404 - CT3
                if (response.status === 404) {
                    loading.classList.remove('show');
                    showError(`❌ Personagem com ID ${id} não foi encontrado. Verifique se o ID existe.`);
                    return;
                }

                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }

                const character = await response.json();
                loading.classList.remove('show');
                displayCharacter(character);
                errorBox.classList.remove('show');

            } catch (error) {
                loading.classList.remove('show');
                showError(`Erro ao buscar personagem: ${error.message}`);
            }
        }

        // Buscar personagem por nome - CT2
        async function searchCharacterByName() {
            const input = document.getElementById('characterNameInput');
            const characterName = input.value.trim();
            const errorBox = document.getElementById('errorBox');
            const characterCard = document.getElementById('characterCard');
            const loading = document.getElementById('loadingSpinner');

            // Validar entrada
            if (!characterName) {
                showError('Por favor, digite um nome válido.');
                return;
            }

            // Mostrar loading
            loading.classList.add('show');
            errorBox.classList.remove('show');
            characterCard.classList.remove('show');

            try {
                const response = await fetch(`https://rickandmortyapi.com/api/character/?name=${characterName}`);
                
                if (response.status === 404 || !response.ok) {
                    loading.classList.remove('show');
                    showError(`❌ Nenhum personagem encontrado com o nome "${characterName}".`);
                    return;
                }

                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    loading.classList.remove('show');
                    showError(`❌ Nenhum personagem encontrado com o nome "${characterName}".`);
                    return;
                }

                // Mostrar o primeiro resultado
                loading.classList.remove('show');
                displayCharacter(data.results[0]);
                errorBox.classList.remove('show');

            } catch (error) {
                loading.classList.remove('show');
                showError(`Erro ao buscar personagem: ${error.message}`);
            }
        }

        // Exibir informações do personagem
        function displayCharacter(character) {
            document.getElementById('characterImage').src = character.image;
            document.getElementById('characterName').textContent = character.name;
            document.getElementById('characterId').textContent = character.id;
            document.getElementById('characterStatus').textContent = character.status;
            document.getElementById('characterSpecies').textContent = character.species;
            document.getElementById('characterType').textContent = character.type || 'N/A';
            document.getElementById('characterGender').textContent = character.gender;
            document.getElementById('characterOrigin').textContent = character.origin.name;
            document.getElementById('characterLocation').textContent = character.location.name;
            document.getElementById('characterEpisodes').textContent = `${character.episode.length} episódios`;
            
            // Formatar data de criação
            const createdDate = new Date(character.created);
            const formattedDate = createdDate.toLocaleDateString('pt-BR');
            document.getElementById('characterCreated').textContent = formattedDate;

            document.getElementById('characterCard').classList.add('show');
        }

        // Mostrar erro
        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = `<strong>Erro:</strong> ${message}`;
            errorBox.classList.add('show');
            document.getElementById('characterCard').classList.remove('show');
        }

        // Permitir buscar com Enter
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                const tab = document.getElementById('tab-id').classList.contains('active') ? 'id' : 'name';
                if (tab === 'id') {
                    searchCharacterById();
                } else {
                    searchCharacterByName();
                }
            }
        });

        // Carregar dados ao iniciar
        window.addEventListener('load', loadTotalCharacters);
    </script>
</body>
</html>
